<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1600" height="900" fill="#0a0a0f"/>
  <text x="800" y="70" fill="#e0e0e0" font-size="40" font-weight="700" text-anchor="middle">The Improvement Disguise</text>
  <text x="800" y="110" fill="#888888" font-size="22" text-anchor="middle">XL-6: a "cost optimization" ships. Fleet celebrates. Quality quietly dies.</text>

  <!-- LEFT panel: what the dashboard showed -->
  <rect x="60" y="160" width="700" height="640" rx="14" fill="#12121a" stroke="#1e1e2e" stroke-width="2"/>
  <text x="90" y="210" fill="#888888" font-size="18" font-weight="600" letter-spacing="1">WHAT THE DASHBOARD SHOWED</text>
  <text x="90" y="250" fill="#34a853" font-size="26" font-weight="700">✓ Latency improved</text>

  <!-- left axis -->
  <line x1="150" y1="320" x2="150" y2="700" stroke="#3a3a5a" stroke-width="2"/>
  <line x1="150" y1="700" x2="700" y2="700" stroke="#3a3a5a" stroke-width="2"/>
  <!-- descending latency line (down = good here) -->
  <polyline points="180,400 320,470 460,540 600,610 660,640" fill="none" stroke="#34a853" stroke-width="5"/>
  <circle cx="180" cy="400" r="7" fill="#34a853"/><circle cx="660" cy="640" r="7" fill="#34a853"/>
  <text x="180" y="385" fill="#34a853" font-size="20" text-anchor="middle">2,575ms</text>
  <text x="660" y="630" fill="#34a853" font-size="20" text-anchor="middle">2,091ms</text>
  <text x="430" y="745" fill="#888888" font-size="18" text-anchor="middle">latency over time  (−19%)</text>
  <text x="90" y="785" fill="#888888" font-size="17">On-call: "the new config is working great."</text>

  <!-- RIGHT panel: what was actually happening -->
  <rect x="840" y="160" width="700" height="640" rx="14" fill="#12121a" stroke="#1e1e2e" stroke-width="2"/>
  <text x="870" y="210" fill="#888888" font-size="18" font-weight="600" letter-spacing="1">WHAT GALILEO SAW</text>
  <text x="870" y="250" fill="#ff6b6b" font-size="26" font-weight="700">🚨 Completeness collapsing</text>

  <line x1="930" y1="320" x2="930" y2="700" stroke="#3a3a5a" stroke-width="2"/>
  <line x1="930" y1="700" x2="1480" y2="700" stroke="#3a3a5a" stroke-width="2"/>
  <!-- descending completeness line (down = bad) -->
  <polyline points="960,360 1100,420 1240,540 1380,620 1440,648" fill="none" stroke="#ff6b6b" stroke-width="5"/>
  <circle cx="960" cy="360" r="7" fill="#ff6b6b"/><circle cx="1440" cy="648" r="7" fill="#ff6b6b"/>
  <text x="975" y="345" fill="#ff6b6b" font-size="20">completeness 0.98</text>
  <text x="1430" y="638" fill="#ff6b6b" font-size="20" text-anchor="end">0.65</text>
  <text x="1210" y="745" fill="#888888" font-size="18" text-anchor="middle">completeness over the same window</text>
  <text x="870" y="785" fill="#888888" font-size="17">context_adherence stayed 1.00 — one metric wouldn't catch this.</text>

  <!-- center punchline -->
  <text x="800" y="860" fill="#f5a623" font-size="22" font-weight="600" text-anchor="middle">Both lines go down. On the left that's a win. On the right it's a regression. Only 100% scoring sees it.</text>
</svg>
